name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job de validação e build
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📋 Instalar dependências
      run: npm ci
      
    - name: 🔍 Verificar TypeScript
      run: npx tsc --noEmit --skipLibCheck
      
    - name: 🔨 Build do projeto
      run: npm run build
      
    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: dist/
        retention-days: 7

  # Job de build para Android (opcional)
  build-android:
    name: 📱 Build Android
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      
    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 📋 Instalar dependências
      run: npm ci
      
    - name: 🔨 Build web
      run: npm run build
      
    - name: 📱 Sync Capacitor
      run: npx cap sync android
      
    - name: 🔨 Build Android
      run: cd android && ./gradlew assembleDebug
      
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: android/app/build/outputs/apk/debug/
        retention-days: 30

  # Job de notificação de status
  notify-status:
    name: 📢 Notificar Status
    runs-on: ubuntu-latest
    needs: [build-and-test, build-android]
    if: always()
    
    steps:
    - name: ✅ Sucesso
      if: needs.build-and-test.result == 'success'
      run: |
        echo "🎉 Build concluído com sucesso!"
        echo "✅ Todos os testes passaram"
        echo "📦 Artifacts disponíveis para download"
        
    - name: ❌ Falha
      if: needs.build-and-test.result == 'failure'
      run: |
        echo "💥 Build falhou!"
        echo "❌ Verifique os logs para mais detalhes"
        exit 1